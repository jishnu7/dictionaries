name: Build and publish language packs

# Runs on GitHub (the repo is mirrored here from GitLab). Packages each language into a
# <lang>.zip plus index.json that Indic Keyboard's VarnamDownloadManager downloads.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Data version stamped on every scheme'
        required: true
        default: '1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Resolve version and tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packs + index.json
        run: |
          python3 build.py \
            --version "${{ steps.meta.outputs.version }}" \
            --base-url "${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/*.zip
            dist/index.json
