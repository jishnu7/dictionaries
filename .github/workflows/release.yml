name: Build and publish language packs

# Repackages varnamproject/schemes release zips into per-language <lang>.zip + index.json that
# Indic Keyboard's VarnamDownloadManager downloads. build.py fetches the upstream zips itself,
# so no submodule/LFS checkout is needed.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Data version stamped on every scheme'
        required: true
        default: '1'
      schemes_tag:
        description: 'varnamproject/schemes release tag to source data from'
        required: true
        default: 'v1.8.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Resolve version and tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packs + index.json
        run: |
          python3 build.py \
            --schemes-tag "${{ github.event.inputs.schemes_tag || 'v1.8.0' }}" \
            --version "${{ steps.meta.outputs.version }}" \
            --base-url "${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/*.zip
            dist/index.json
