name: Build and publish language packs

# Builds every language artifact from the committed per-language sources in languages/ and
# publishes <lang>.zip + index.json that Indic Keyboard's VarnamDownloadManager downloads.
# The govarnam CLI is downloaded as a prebuilt binary; the dicttool jar is committed.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Data version stamped on every pack'
        required: true
        default: '1'
      langs:
        description: 'Optional space-separated subset of language codes (default: all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Download govarnam CLI
        run: make varnamcli

      - name: Fetch scheme VSTs from varnamproject/schemes
        run: make schemes

      - name: Resolve version and tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packs + index.json
        run: |
          make all \
            VERSION="${{ steps.meta.outputs.version }}" \
            BASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}" \
            LANGS="${{ github.event.inputs.langs }}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/*.zip
            dist/index.json
